<!doctype html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 번호 추천</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <button id="themeBtn" onclick="toggleTheme()" title="테마 변경">🌙</button>
  <div class="container">
    <h1>로또 번호 추천</h1>
    <p class="subtitle">버튼을 눌러 행운의 번호를 뽑아보세요!</p>
    <div id="numbers" class="numbers"></div>
    <button id="pickBtn" onclick="pickNumbers()">번호 뽑기</button>
  </div>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
