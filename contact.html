<!doctype html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>제휴 문의 | 로또 번호 추천</title>
  <link href='/style.css' rel='stylesheet'>
  <link href='/contact.css' rel='stylesheet'>
</head>
<body>
  <button id="themeBtn" onclick="toggleTheme()" title="테마 변경">🌙</button>
  <div class="container">
    <a href="/" class="back-link">← 로또 번호 추천으로 돌아가기</a>
    <h1>제휴 문의</h1>
    <p class="subtitle">궁금한 점이 있으시면 아래 양식을 작성해 주세요.</p>

    <form id="contactForm" action="https://formspree.io/f/xojkwaqk" method="POST">
      <div class="field">
        <label for="name">이름</label>
        <input type="text" id="name" name="name" placeholder="홍길동" required />
      </div>
      <div class="field">
        <label for="email">이메일</label>
        <input type="email" id="email" name="email" placeholder="example@email.com" required />
      </div>
      <div class="field">
        <label for="company">회사명</label>
        <input type="text" id="company" name="company" placeholder="(주)예시컴퍼니" />
      </div>
      <div class="field">
        <label for="message">문의 내용</label>
        <textarea id="message" name="message" rows="5" placeholder="제휴 관련 문의 내용을 입력해 주세요." required></textarea>
      </div>
      <button type="submit" id="submitBtn">문의 보내기</button>
    </form>

    <div id="successMsg" class="success-msg" style="display:none;">
      문의가 성공적으로 접수되었습니다. 빠른 시일 내에 답변 드리겠습니다.
    </div>
  </div>
  <script defer src="/main.js"></script>
  <script>
    const form = document.getElementById('contactForm');
    const submitBtn = document.getElementById('submitBtn');
    const successMsg = document.getElementById('successMsg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      submitBtn.disabled = true;
      submitBtn.textContent = '전송 중...';

      const res = await fetch(form.action, {
        method: 'POST',
        body: new FormData(form),
        headers: { Accept: 'application/json' }
      });

      if (res.ok) {
        form.style.display = 'none';
        successMsg.style.display = 'block';
      } else {
        submitBtn.disabled = false;
        submitBtn.textContent = '문의 보내기';
        alert('전송 중 오류가 발생했습니다. 다시 시도해 주세요.');
      }
    });
  </script>
</body>
</html>
